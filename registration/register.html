<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Sign In/Up Form</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css'>
  <link rel="stylesheet" href="./register.css">

</head>
<body>

<div class="container" id="container">
    <div class="form-container sign-up-container">
		<form id="regForm" novalidate>
			<h1>Create Account</h1>
			<div class="social-container">
				<a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
				<a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
				<a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
			</div>
			<span>or use your email for registration</span>
			<input type="text" id="fullName" placeholder="Name"  />
            <div id="nameMsg" class="error-text"></div>

			<input type="email" id="email" placeholder="Email" />
            <div id="emailMsg" class="error-text"></div>

            <select id="city" style="width: 100%; padding: 12px; margin: 8px 0; background-color: #eee; border: none;">
                <option value="" disabled selected>Select your city</option>
                <option  value="Cairo">Cairo</option>
                <option value="Alexandria">Alexandria</option>
                <option value="Dubai">Dubai</option>
            </select>

			<input type="password" id="pass" placeholder="Password"  />

            <input type="password" id="repeatPass" placeholder="Repeat password"  />
            <div id="passMsg" class="error-text"></div>

            <label style="font-size: 12px; margin: 10px 0; display: flex; align-items: center; gap: 5px;">
                <input type="checkbox" id="terms" style="width: auto;" checked> I accept the terms
            </label>

			<button type="submit">Sign Up</button>
            <div id="formFeedback" style="color: #ad2f2f; font-size: 11px;"></div>
		</form>
	</div>

    <div class="form-container sign-in-container">
		<form id="signinForm" novalidate>
			<h1>Sign in</h1>
			<div class="social-container">
				<a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
				<a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
				<a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
			</div>
			<span>or use your account</span>
			<input type="email" placeholder="Email" id="signinEmail" />
			<input type="password" placeholder="Password" id="signinPass"  />
			<a href="#">Forgot your password?</a>
			<button type="submit" id="signinBtn">Sign In</button>
            <div id="signinFeedback" style="color: #a73636; font-size: 11px;"></div>
		</form>
	</div>

    <div class="overlay-container">
		<div class="overlay">
			<div class="overlay-panel overlay-left">
				<h1>Welcome Back!</h1>
				<p>To keep connected with us please login with your personal info</p>
				<button class="ghost" id="signIn" >Sign In</button>
			</div>
			<div class="overlay-panel overlay-right">
				<h1>Hello, Friend!</h1>
				<p>Enter your personal details and start journey with us</p>
				<button class="ghost" id="signUp">Sign Up</button>
			</div>
		</div>
	</div>
</div>


<script  src="./register.js" type="module"></script>

</body>
</html>
