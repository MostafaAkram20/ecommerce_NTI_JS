<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Store | Order</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../home_page/home_style.css" />
    <link rel="stylesheet" href="./order.css" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm h-50">
      <div class="container">
        <a class="navbar-brand fw-bold" href="../home_page/home.html"
          >🛒 SIMPLE<span class="text-primary">STORE</span></a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="../home_page/home.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../categories/womens.html">Women's Fashion</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../categories/mens.html">Men's Fashion</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../categories/electronics.html">Electronics</a>
            </li>
            <li class="nav-item ms-lg-3">
              <a class="btn btn-outline-light btn-sm" href="../carts/carts.html">Back to Shop</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4 flex-grow-1">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-end gap-2 mb-3">
        <div>
          <h2 class="fw-bold mb-1">Your Order</h2>
          <div class="text-muted">Review cart items and place your order.</div>
        </div>
        <a class="btn btn-outline-secondary" href="../carts/carts.html">Continue shopping</a>
      </div>

      <div id="orderAlert" class="alert d-none" role="alert"></div>

      <div class="row g-4">
        <div class="col-12 col-lg-7">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title mb-3">Items</h5>
              <div id="orderItems"></div>
              <div id="emptyState" class="text-muted d-none">
                Your cart is empty. Add some products first.
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title mb-3">Summary</h5>

              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Items</span>
                <span id="orderCount" class="fw-semibold">0</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span class="text-muted">Total</span>
                <span id="orderTotal" class="fw-bold">$0.00</span>
              </div>

              <hr />

              <h6 class="mb-3">Customer details</h6>
              <form id="orderForm" class="vstack gap-2">
                <div>
                  <label for="customerName" class="form-label mb-1">Full name</label>
                  <input id="customerName" class="form-control" type="text" placeholder="Your name" required />
                </div>
                <div>
                  <label for="customerPhone" class="form-label mb-1">Phone</label>
                  <input id="customerPhone" class="form-control" type="tel" placeholder="+20..." required />
                </div>
                <div>
                  <label for="customerAddress" class="form-label mb-1">Address</label>
                  <textarea id="customerAddress" class="form-control" rows="3" placeholder="Delivery address" required></textarea>
                </div>
                <div>
                  <label for="customerNote" class="form-label mb-1">Note (optional)</label>
                  <textarea id="customerNote" class="form-control" rows="2" placeholder="Anything we should know?"></textarea>
                </div>

                <button id="placeOrderBtn" type="submit" class="btn btn-primary w-100 mt-2">
                  Place Order
                </button>
                <button id="clearCartFromOrderBtn" type="button" class="btn btn-outline-danger w-100">
                  Clear Cart
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-4">
      <small>&copy; <span id="yearSpan"></span> Simple Store</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./order.js"></script>
  </body>
</html>
